name: EventTimeline
options:
  bundleIdPrefix: com.example
settings:
  base:
    SWIFT_VERSION: 5.10
configs:
  Debug: debug
  Release: release
targets:
  EventTimeline:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - EventTimelineApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.eventtimeline
        INFOPLIST_KEY_CFBundleDisplayName: 事件时间轴
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        GENERATE_INFOPLIST_FILE: YES
        TARGETED_DEVICE_FAMILY: "1,2"

