name: event_timeline
description: A Flutter timeline app for tracking ongoing events.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^4.1.1
  firebase_messaging: ^16.0.1
  flutter_slidable: ^3.1.1
  http: ^1.4.0
  intl: ^0.19.0
  share_plus: ^10.0.2
  shared_preferences: ^2.5.3
  url_launcher: ^6.3.1
  webview_windows: ^0.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
